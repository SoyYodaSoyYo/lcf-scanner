<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCF — Ficha Técnica del Expositor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1b2d; color: white; font-family: Arial, sans-serif; min-height: 100vh; }
    .header { background: #1B3A6B; padding: 16px; text-align: center; }
    .header h1 { font-size: 20px; letter-spacing: 2px; }
    .header p { font-size: 12px; color: #a0b4c8; margin-top: 4px; }
    .container { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
    .seccion { background: #1a2940; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .seccion h2 { font-size: 15px; color: #a0b4c8; letter-spacing: 1px; margin-bottom: 16px; text-transform: uppercase; border-bottom: 1px solid #2E5FA3; padding-bottom: 8px; }
    .campo { margin-bottom: 16px; }
    .campo label { display: block; font-size: 13px; color: #a0b4c8; margin-bottom: 6px; }
    .campo input, .campo select { width: 100%; background: #0f1b2d; border: 1px solid #2E5FA3; border-radius: 8px; padding: 12px; color: white; font-size: 15px; }
    .campo input::placeholder { color: #4a6080; }
    .campo select option { background: #0f1b2d; }
    .campo input:focus, .campo select:focus { outline: none; border-color: #5a8fd4; }
    .fila-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-submit { width: 100%; background: #2E5FA3; color: white; border: none; padding: 16px; border-radius: 10px; font-size: 17px; cursor: pointer; margin-top: 8px; }
    .btn-submit:disabled { background: #555; cursor: not-allowed; }
    .resultado { display: none; text-align: center; padding: 24px; border-radius: 12px; margin-top: 20px; }
    .resultado.exito { background: #1A7A4A; display: block; }
    .resultado.error { background: #A32D2D; display: block; }
    .resultado .icono { font-size: 48px; margin-bottom: 12px; }
    .resultado h3 { font-size: 20px; margin-bottom: 8px; }
    .resultado p { font-size: 14px; opacity: 0.9; }
    .required { color: #e05a5a; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🍹 FICHA TÉCNICA</h1>
    <p>La Coctelera Festival — Registro del Expositor</p>
  </div>

  <div class="container">

    <!-- SECCIÓN 1: DATOS DE MARCA -->
    <div class="seccion">
      <h2>Datos de la Marca</h2>
      <div class="campo">
        <label>Nombre de la Marca / Empresa <span class="required">*</span></label>
        <input type="text" id="nombre_marca" placeholder="Ej: Diageo Chile" required>
      </div>
      <div class="fila-2">
        <div class="campo">
          <label>Nombre Responsable <span class="required">*</span></label>
          <input type="text" id="responsable_nombre" placeholder="Nombre completo">
        </div>
        <div class="campo">
          <label>Email Responsable <span class="required">*</span></label>
          <input type="email" id="responsable_email" placeholder="correo@marca.cl">
        </div>
      </div>
      <div class="campo">
        <label>Tamaño del Stand (m²) <span class="required">*</span></label>
        <select id="tamanio_stand_m2">
          <option value="">Selecciona...</option>
          <option value="6">Hasta 6 m²</option>
          <option value="12">Hasta 12 m²</option>
          <option value="20">Más de 12 m²</option>
        </select>
      </div>
    </div>

    <!-- SECCIÓN 2: REQUERIMIENTOS TÉCNICOS -->
    <div class="seccion">
      <h2>Requerimientos Técnicos</h2>
      <div class="fila-2">
        <div class="campo">
          <label>Cristalería <span class="required">*</span></label>
          <select id="cristaleria">
            <option value="">Selecciona...</option>
            <option value="200cc">Vaso 200cc</option>
            <option value="380cc">Vaso 380cc</option>
            <option value="propia">Cristalería Propia</option>
          </select>
        </div>
        <div class="campo">
          <label>Tipo de Hielo <span class="required">*</span></label>
          <select id="tipo_hielo">
            <option value="">Selecciona...</option>
            <option value="Cubo">Cubo</option>
            <option value="Frappé">Frappé</option>
            <option value="Escama">Escama</option>
          </select>
        </div>
      </div>
      <div class="campo">
        <label>Consumo Eléctrico <span class="required">*</span></label>
        <select id="electricidad">
          <option value="">Selecciona...</option>
          <option value="Monofásico 10a">Monofásico 10A (estándar)</option>
          <option value="Bifásico 16a">Bifásico 16A</option>
          <option value="Trifásico 32a">Trifásico 32A</option>
        </select>
      </div>
    </div>

    <!-- SECCIÓN 3: ACREDITACIÓN VEHICULAR -->
    <div class="seccion">
      <h2>Acreditación Vehicular</h2>
      <div class="fila-2">
        <div class="campo">
          <label>Patente Vehículo Montaje</label>
          <input type="text" id="patente_montaje" placeholder="Ej: ABCD12" maxlength="8" style="text-transform:uppercase">
        </div>
        <div class="campo">
          <label>Patente Vehículo Día Evento</label>
          <input type="text" id="patente_evento" placeholder="Ej: WXYZ34" maxlength="8" style="text-transform:uppercase">
        </div>
      </div>
    </div>

    <!-- BOTÓN ENVIAR -->
    <button class="btn-submit" id="btnEnviar" onclick="enviarFicha()">
      Enviar Ficha Técnica
    </button>

    <!-- RESULTADO -->
    <div class="resultado" id="resultado">
      <div class="icono" id="resultadoIcono"></div>
      <h3 id="resultadoTitulo"></h3>
      <p id="resultadoMsg"></p>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://rqphqvvnhfforkzmmgpm.supabase.co';
    const SUPABASE_KEY = 'TU_PUBLISHABLE_KEY';

    async function enviarFicha() {
      const btn = document.getElementById('btnEnviar');

      const datos = {
        nombre_marca: document.getElementById('nombre_marca').value.trim(),
        responsable_nombre: document.getElementById('responsable_nombre').value.trim(),
        responsable_email: document.getElementById('responsable_email').value.trim(),
        tamanio_stand_m2: parseInt(document.getElementById('tamanio_stand_m2').value),
        cristaleria: document.getElementById('cristaleria').value,
        tipo_hielo: document.getElementById('tipo_hielo').value,
        electricidad: document.getElementById('electricidad').value,
        patente_montaje: document.getElementById('patente_montaje').value.toUpperCase().trim(),
        patente_evento: document.getElementById('patente_evento').value.toUpperCase().trim(),
        estado_acreditacion: 'Pendiente'
      };

      // Validación
      if (!datos.nombre_marca || !datos.responsable_nombre || !datos.responsable_email || !datos.cristaleria || !datos.tipo_hielo || !datos.electricidad || !datos.tamanio_stand_m2) {
        mostrarResultado('error', '⚠️', 'Campos Incompletos', 'Por favor completa todos los campos obligatorios marcados con *');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/expositores`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(datos)
        });

        if (res.ok) {
          mostrarResultado('exito', '✓', '¡Ficha Enviada!', 'Tu ficha técnica fue registrada correctamente. El equipo de producción revisará tus datos y recibirás confirmación por email.');
          document.querySelector('.container').scrollTop = 0;
          window.scrollTo(0, document.body.scrollHeight);
        } else {
          const err = await res.json();
          if (err.code === '23505') {
            mostrarResultado('error', '⚠️', 'Ya Registrado', 'Este email ya tiene una ficha técnica registrada. Contacta a producción si necesitas hacer cambios.');
          } else {
            mostrarResultado('error', '✗', 'Error al Enviar', 'Hubo un problema al guardar tu ficha. Intenta de nuevo o contacta a producción.');
          }
          btn.disabled = false;
          btn.textContent = 'Enviar Ficha Técnica';
        }
      } catch(e) {
        mostrarResultado('error', '✗', 'Error de Conexión', 'Verifica tu conexión a internet e intenta de nuevo.');
        btn.disabled = false;
        btn.textContent = 'Enviar Ficha Técnica';
      }
    }

    function mostrarResultado(tipo, icono, titulo, msg) {
      document.getElementById('resultadoIcono').textContent = icono;
      document.getElementById('resultadoTitulo').textContent = titulo;
      document.getElementById('resultadoMsg').textContent = msg;
      document.getElementById('resultado').className = `resultado ${tipo}`;
    }
  </script>
</body>
</html>
```

Reemplaza `TU_PUBLISHABLE_KEY` → **Commit** → prueba en:
```
lcf-scanner.vercel.app/ficha-tecnica
