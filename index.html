<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCF Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1b2d; color: white; font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: #1B3A6B; padding: 12px 16px; text-align: center; flex-shrink: 0; }
    .header h1 { font-size: 18px; letter-spacing: 2px; }
    .header p { font-size: 11px; color: #a0b4c8; margin-top: 2px; }
    .scanner-wrap { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #canvas { display: none; }

    /* Popup overlay encima de la cámara */
    .popup { 
      position: absolute; 
      top: 50%; left: 50%; 
      transform: translate(-50%, -50%);
      width: 80%; max-width: 320px;
      padding: 24px 20px;
      border-radius: 16px;
      text-align: center;
      display: none;
      z-index: 10;
      animation: popIn 0.2s ease;
    }
    @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    .popup.success { background: rgba(26, 122, 74, 0.95); display: block; }
    .popup.error   { background: rgba(163, 45, 45, 0.95); display: block; }
    .popup .icon { font-size: 52px; margin-bottom: 8px; }
    .popup h2 { font-size: 22px; font-weight: bold; margin-bottom: 6px; }
    .popup p { font-size: 14px; opacity: 0.9; }

    /* Marco de escaneo */
    .scan-frame {
      position: absolute;
      width: 220px; height: 220px;
      border: 3px solid rgba(255,255,255,0.6);
      border-radius: 16px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .scan-frame::before, .scan-frame::after {
      content: '';
      position: absolute;
      width: 30px; height: 30px;
      border-color: white;
      border-style: solid;
    }
    .scan-frame::before { top: -3px; left: -3px; border-width: 4px 0 0 4px; border-radius: 4px 0 0 0; }
    .scan-frame::after  { bottom: -3px; right: -3px; border-width: 0 4px 4px 0; border-radius: 0 0 4px 0; }

    /* Status bar flotante */
    .status-bar {
      position: absolute;
      bottom: 80px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      color: #e0e8f0;
      white-space: nowrap;
    }

    /* Botón */
    .btn-wrap { position: absolute; bottom: 16px; width: 100%; padding: 0 20px; }
    .btn { background: #2E5FA3; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; }

    /* Offline */
    .offline-banner { background: #A32D2D; text-align: center; padding: 8px; font-size: 13px; display: none; flex-shrink: 0; }
  </style>
</head>
<body>

  <div class="offline-banner" id="offlineBanner">⚠️ Sin conexión — Escaneo bloqueado</div>

  <div class="header">
    <h1>🍹 LCF SCANNER</h1>
    <p>La Coctelera Festival</p>
  </div>

  <div class="scanner-wrap">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="scan-frame"></div>
    <div class="status-bar" id="statusBar">Toca el botón para escanear</div>

    <!-- Popup resultado -->
    <div class="popup" id="popup">
      <div class="icon" id="popIcon"></div>
      <h2 id="popTitle"></h2>
      <p id="popMsg"></p>
    </div>

    <div class="btn-wrap">
      <button class="btn" id="btnScan" onclick="iniciarCamara()">📷 Activar Cámara</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://rqphqvvnhfforkzmmgpm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_yzlVRXDgiLFPWV_tqHVHVg_cQxpDeaM';

    let scanning = false;

    function checkOnline() {
      const b = document.getElementById('offlineBanner');
      if (!navigator.onLine) { b.style.display = 'block'; return false; }
      b.style.display = 'none'; return true;
    }
    window.addEventListener('online', checkOnline);
    window.addEventListener('offline', checkOnline);
    checkOnline();

    async function iniciarCamara() {
      if (!checkOnline()) return;
      document.getElementById('statusBar').textContent = 'Activando cámara...';
      document.getElementById('btnScan').style.display = 'none';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        const video = document.getElementById('video');
        video.srcObject = stream;
        video.play();
        scanning = true;
        document.getElementById('statusBar').textContent = 'Apunta al QR del asistente';
        requestAnimationFrame(scanFrame);
      } catch(e) {
        document.getElementById('statusBar').textContent = 'Error: ' + e.message;
        document.getElementById('btnScan').style.display = 'block';
      }
    }

    function scanFrame() {
      if (!scanning) return;
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          scanning = false;
          document.getElementById('statusBar').textContent = 'Validando...';
          validarCover(code.data);
          return;
        }
      }
      requestAnimationFrame(scanFrame);
    }

    async function validarCover(qrToken) {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/covers?qr_token=eq.${qrToken}&select=id,estado,tipo_cover,descripcion`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const data = await res.json();
        if (!data || data.length === 0) {
          mostrarPopup('error', '✗', 'QR Inválido', 'Este código no existe en el sistema.');
        } else {
          const cover = data[0];
          if (cover.estado === 'disponible') {
            await canjearCover(cover.id);
            mostrarPopup('success', '✓', cover.tipo_cover.toUpperCase(), cover.descripcion || 'Canje exitoso');
          } else if (cover.estado === 'canjeado') {
            mostrarPopup('error', '✗', 'Ya Canjeado', 'Este cover ya fue utilizado.');
          } else {
            mostrarPopup('error', '✗', 'No Válido', `Estado: ${cover.estado}`);
          }
        }
      } catch(e) {
        mostrarPopup('error', '✗', 'Error de conexión', 'Verifica tu señal e intenta de nuevo.');
      }
      setTimeout(() => {
        document.getElementById('popup').className = 'popup';
        document.getElementById('statusBar').textContent = 'Apunta al QR del asistente';
        scanning = true;
        requestAnimationFrame(scanFrame);
      }, 3000);
    }

    async function canjearCover(id) {
      await fetch(`${SUPABASE_URL}/rest/v1/covers?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ estado: 'canjeado', canjeado_at: new Date().toISOString() })
      });
    }

    function mostrarPopup(tipo, icono, titulo, msg) {
      document.getElementById('popIcon').textContent = icono;
      document.getElementById('popTitle').textContent = titulo;
      document.getElementById('popMsg').textContent = msg;
      document.getElementById('popup').className = `popup ${tipo}`;
      document.getElementById('statusBar').textContent = tipo === 'success' ? '✓ Canje registrado' : '✗ Canje rechazado';
    }
  </script>
</body>
</html>
