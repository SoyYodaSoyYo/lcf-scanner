<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCF Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1b2d; color: white; font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .header { background: #1B3A6B; padding: 12px 16px; text-align: center; flex-shrink: 0; }
    .header h1 { font-size: 18px; letter-spacing: 2px; }
    .header p { font-size: 11px; color: #a0b4c8; margin-top: 2px; }

    /* Pantalla de inicio — cubre todo antes de activar cámara */
    .inicio {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #0f1b2d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 200; padding: 40px 24px;
    }
    .inicio .logo { font-size: 64px; margin-bottom: 16px; }
    .inicio h2 { font-size: 22px; font-weight: bold; color: white; margin-bottom: 8px; text-align: center; }
    .inicio p { font-size: 14px; color: #a0b4c8; margin-bottom: 40px; text-align: center; }
    .inicio .btn-inicio {
      background: #2E5FA3; color: white; border: none;
      padding: 18px 40px; border-radius: 12px;
      font-size: 18px; cursor: pointer; width: 100%;
      max-width: 320px; letter-spacing: 1px;
    }
    .inicio.oculto { display: none; }

    /* Scanner */
    .scanner-wrap { position: relative; flex: 1; overflow: hidden; min-height: 0; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #canvas { display: none; }

    .scan-frame { position: absolute; width: 240px; height: 240px; border: 3px solid rgba(255,255,255,0.7); border-radius: 16px; top: 50%; left: 50%; transform: translate(-50%, -60%); pointer-events: none; }
    .scan-frame::before, .scan-frame::after { content: ''; position: absolute; width: 32px; height: 32px; border-color: white; border-style: solid; }
    .scan-frame::before { top: -3px; left: -3px; border-width: 5px 0 0 5px; border-radius: 4px 0 0 0; }
    .scan-frame::after { bottom: -3px; right: -3px; border-width: 0 5px 5px 0; border-radius: 0 0 4px 0; }

    .status-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.65); padding: 10px 24px; border-radius: 24px; font-size: 14px; color: #e0e8f0; white-space: nowrap; z-index: 5; }

    .softclose-banner { position: absolute; top: 0; left: 0; right: 0; padding: 12px; text-align: center; font-size: 14px; font-weight: bold; display: none; z-index: 10; }
    .softclose-banner.warning { background: rgba(125,90,0,0.92); display: block; }
    .softclose-banner.closed { background: rgba(163,45,45,0.95); display: block; }

    .offline-banner { background: #A32D2D; text-align: center; padding: 8px; font-size: 13px; display: none; flex-shrink: 0; }

    /* Flash pantalla completa */
    .flash { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 300; display: none; align-items: center; justify-content: center; flex-direction: column; }
    .flash.success { background: #1A7A4A; display: flex; }
    .flash.error { background: #A32D2D; display: flex; }
    .flash .icon { font-size: 90px; margin-bottom: 16px; }
    .flash .title { font-size: 30px; font-weight: bold; margin-bottom: 10px; text-align: center; padding: 0 24px; }
    .flash .msg { font-size: 16px; opacity: 0.9; text-align: center; padding: 0 24px; }
  </style>
</head>
<body>

  <div class="offline-banner" id="offlineBanner">⚠️ Sin conexión — Escaneo bloqueado</div>

  <div class="header">
    <h1>🍹 LCF SCANNER</h1>
    <p>La Coctelera Festival</p>
  </div>

  <!-- Pantalla de inicio -->
  <div class="inicio" id="pantallaInicio">
    <div class="logo">🍹</div>
    <h2>LCF Scanner</h2>
    <p>Toca el botón para activar la cámara y escanear los QR de beneficios</p>
    <button class="btn-inicio" id="btnScan" onclick="iniciarCamara()">📷 Activar Cámara</button>
  </div>

  <!-- Scanner -->
  <div class="scanner-wrap">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="scan-frame"></div>
    <div class="softclose-banner" id="softcloseBanner"></div>
    <div class="status-bar" id="statusBar">Iniciando...</div>
    <div class="flash" id="flash">
      <div class="icon" id="flashIcon"></div>
      <div class="title" id="flashTitle"></div>
      <div class="msg" id="flashMsg"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://rqphqvvnhfforkzmmgpm.supabase.co';
    const SUPABASE_KEY = 'TU_PUBLISHABLE_KEY';

    let scanning = false;
    let sistemaBlockeado = false;

    function checkOnline() {
      const b = document.getElementById('offlineBanner');
      if (!navigator.onLine) { b.style.display = 'block'; return false; }
      b.style.display = 'none'; return true;
    }
    window.addEventListener('online', checkOnline);
    window.addEventListener('offline', checkOnline);
    checkOnline();

    function toMinutos(timeStr) {
      const parts = timeStr.split(':');
      return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

    async function checkHorario() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/jornadas?estado=eq.activa&select=hard_stop_hora,soft_close_hora&limit=1`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const data = await res.json();
        const banner = document.getElementById('softcloseBanner');
        const btn = document.getElementById('btnScan');

        if (!data || data.length === 0) {
          banner.className = 'softclose-banner';
          sistemaBlockeado = false;
          return;
        }

        const ahora = new Date();
        const minutosActuales = ahora.getHours() * 60 + ahora.getMinutes();
        const hardStopMin = toMinutos(data[0].hard_stop_hora);
        const softCloseMin = toMinutos(data[0].soft_close_hora);
        const enZonaCorte = minutosActuales <= 180;

        if (enZonaCorte && minutosActuales >= hardStopMin) {
          sistemaBlockeado = true;
          scanning = false;
          banner.className = 'softclose-banner closed';
          banner.textContent = '🔴 Sistema cerrado — Canjes finalizados';
          if (btn) btn.disabled = true;
        } else if (enZonaCorte && minutosActuales >= softCloseMin) {
          sistemaBlockeado = false;
          banner.className = 'softclose-banner warning';
          banner.textContent = '⚠️ Sistema cerrando — Solo clientes en fila';
        } else {
          sistemaBlockeado = false;
          banner.className = 'softclose-banner';
          if (btn) btn.disabled = false;
        }
      } catch(e) {
        sistemaBlockeado = false;
      }
    }

    setInterval(checkHorario, 60000);
    checkHorario();

    async function iniciarCamara() {
      if (!checkOnline()) return;
      if (sistemaBlockeado) return;
      document.getElementById('statusBar').textContent = 'Activando cámara...';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        document.getElementById('video').srcObject = stream;
        document.getElementById('video').play();
        // Ocultar pantalla de inicio
        document.getElementById('pantallaInicio').classList.add('oculto');
        scanning = true;
        document.getElementById('statusBar').textContent = 'Apunta al QR del asistente';
        requestAnimationFrame(scanFrame);
      } catch(e) {
        document.getElementById('statusBar').textContent = 'Error: ' + e.message;
      }
    }

    function scanFrame() {
      if (!scanning) return;
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          scanning = false;
          document.getElementById('statusBar').textContent = 'Validando...';
          validarCover(code.data);
          return;
        }
      }
      requestAnimationFrame(scanFrame);
    }

    async function validarCover(qrToken) {
      if (sistemaBlockeado) {
        mostrarFlash('error', '🔴', 'Sistema Cerrado', 'Los canjes han finalizado por hoy.');
        return;
      }
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/covers?qr_token=eq.${qrToken}&select=id,estado,tipo_cover,descripcion,tipo_beneficio`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const data = await res.json();
        if (!data || data.length === 0) {
          mostrarFlash('error', '✗', 'QR Inválido', 'Este código no existe en el sistema.');
        } else {
          const cover = data[0];
          if (cover.estado === 'disponible') {
            await canjearCover(cover.id);
            const tipo = cover.tipo_beneficio || cover.tipo_cover || 'Beneficio';
            mostrarFlash('success', '✓', tipo.toUpperCase(), cover.descripcion || 'Canje registrado exitosamente');
          } else if (cover.estado === 'canjeado') {
            mostrarFlash('error', '✗', 'Ya Canjeado', 'Este beneficio ya fue utilizado.');
          } else {
            mostrarFlash('error', '✗', 'No Válido', `Estado: ${cover.estado}`);
          }
        }
      } catch(e) {
        mostrarFlash('error', '✗', 'Error de conexión', 'Verifica tu señal e intenta de nuevo.');
      }
      setTimeout(() => {
        document.getElementById('flash').className = 'flash';
        document.getElementById('statusBar').textContent = 'Apunta al QR del asistente';
        if (!sistemaBlockeado) { scanning = true; requestAnimationFrame(scanFrame); }
      }, 2500);
    }

    async function canjearCover(id) {
      await fetch(`${SUPABASE_URL}/rest/v1/covers?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ estado: 'canjeado', canjeado_at: new Date().toISOString() })
      });
    }

    function mostrarFlash(tipo, icono, titulo, msg) {
      const flash = document.getElementById('flash');
      document.getElementById('flashIcon').textContent = icono;
      document.getElementById('flashTitle').textContent = titulo;
      document.getElementById('flashMsg').textContent = msg;
      flash.className = `flash ${tipo}`;
      setTimeout(() => { flash.className = 'flash'; }, 2500);
    }
  </script>
</body>
</html>
